services:
  - type: web
    name: agrisense-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false   # set to your backend URL in Render dashboard
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: agrisense-api
    runtime: python
    region: singapore  # closest to India
    plan: free
    rootDir: backend
    buildCommand: python -V && pip -V && pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: gunicorn main:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120 --graceful-timeout 30 --access-logfile -
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: ALLOWED_ORIGINS
        sync: false   # set in Render dashboard
      - key: LOG_LEVEL
        value: info
    healthCheckPath: /api/health
    autoDeploy: true
