services:
  - type: web
    name: agrisense-api
    runtime: python
    region: singapore  # closest to India
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120 --graceful-timeout 30 --access-logfile -
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: ALLOWED_ORIGINS
        sync: false   # set in Render dashboard
      - key: LOG_LEVEL
        value: info
    healthCheckPath: /api/health
    autoDeploy: true
